##
## Nginx reverse proxy for this project (no 80/443 required)
##
## Usage (example):
##   1) Start backend (leaderboard):  node server/index.js   (default :3000)
##   2) Start frontend (dev server):  npm run dev            (webpack-dev-server prints its port, e.g. :8083)
##   3) Put this file to your nginx conf.d and reload:
##        sudo cp nginx/type.nginx.conf /etc/nginx/conf.d/type.conf
##        sudo nginx -t && sudo systemctl reload nginx
##
## Then visit:
##   http://<server-ip>:8080/
##

server {
    # Change to any free port you can use
    listen 8080;
    listen [::]:8080;
    server_name _;

    # --- API (leaderboard service) ---
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend (dev server) ---
    # If your frontend dev server uses another port, change 8083.
    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Webpack dev server HMR/WebSocket (safe to keep even if unused)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

